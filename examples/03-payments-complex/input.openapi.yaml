openapi: 3.0.0
info:
  title: Catalog & Pricing API
  version: 3.0.0
  description: Product catalog with hierarchical categories, pricing rules, and audit log

servers:
  - url: https://api.catalog.example.com/v3

security:
  - bearerAuth: []

tags:
  - name: Categories
    description: Hierarchical product category management
  - name: Pricing
    description: Pricing rules and calculations
  - name: Audit
    description: Audit log access

paths:
  /categories:
    get:
      summary: List root categories
      operationId: listCategories
      tags:
        - Categories
      parameters:
        - name: depth
          in: query
          required: false
          description: How many levels of children to include (0 = root only)
          schema:
            type: integer
            minimum: 0
            maximum: 5
            default: 0
        - name: X-Request-Id
          in: header
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Root categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

    post:
      summary: Create category
      operationId: createCategory
      tags:
        - Categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                parentId:
                  type: string
                  format: uuid
                  nullable: true
                metadata:
                  type: object
                  additionalProperties:
                    type: string
                  minProperties: 0
                  maxProperties: 20
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /categories/{categoryId}:
    get:
      summary: Get category
      operationId: getCategory
      tags:
        - Categories
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: depth
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 5
            default: 1
      responses:
        '200':
          description: Category with optional children
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /pricing/rules:
    get:
      summary: List pricing rules
      operationId: listPricingRules
      tags:
        - Pricing
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: active
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: List of pricing rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PricingRule'

    post:
      summary: Create pricing rule
      operationId: createPricingRule
      tags:
        - Pricing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePricingRuleRequest'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingRule'
        '400':
          description: Invalid rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /pricing/calculate:
    post:
      summary: Calculate price
      description: Calculate the final price for a product given quantity and applicable rules
      operationId: calculatePrice
      tags:
        - Pricing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
                - quantity
                - currency
              properties:
                productId:
                  type: string
                  format: uuid
                quantity:
                  type: integer
                  minimum: 1
                currency:
                  type: string
                  enum: [USD, EUR, GBP]
      responses:
        '200':
          description: Calculated price breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceBreakdown'

  /audit/events:
    get:
      summary: List audit events
      description: >
        Returns a paginated audit log. Deprecated — use /audit/v2/events instead.
        This endpoint will be removed in v4.
      operationId: listAuditEvents
      deprecated: true
      tags:
        - Audit
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: entityType
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: Audit events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /audit/v2/events:
    get:
      summary: List audit events (v2)
      operationId: listAuditEventsV2
      tags:
        - Audit
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: entityType
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          description: Cursor from previous response for cursor-based pagination
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: Audit events with cursor pagination
          content:
            application/json:
              schema:
                type: object
                required:
                  - events
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'
                  nextCursor:
                    type: string
                    nullable: true

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Category:
      type: object
      required:
        - id
        - name
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true
        children:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        metadata:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
        legacyCode:
          type: string
          deprecated: true
          description: Deprecated. Use id instead.

    PricingRule:
      type: object
      required:
        - id
        - name
        - type
        - value
        - active
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        categoryId:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
          enum: [percentage_discount, fixed_discount, markup]
        value:
          type: number
          format: double
          multipleOf: 0.01
          minimum: 0
        maxDiscount:
          type: number
          format: double
          nullable: true
          description: Cap on the discount amount in absolute currency. Null means uncapped.
        active:
          type: boolean
          default: true
        conditions:
          type: object
          additionalProperties: true
          description: Arbitrary rule conditions as key-value pairs
        createdAt:
          type: string
          format: date-time
          readOnly: true

    CreatePricingRuleRequest:
      type: object
      required:
        - name
        - type
        - value
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        categoryId:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
          enum: [percentage_discount, fixed_discount, markup]
        value:
          type: number
          format: double
          multipleOf: 0.01
          minimum: 0
        maxDiscount:
          type: number
          format: double
          nullable: true
        active:
          type: boolean
          default: true
        conditions:
          type: object
          additionalProperties: true

    PriceBreakdown:
      type: object
      required:
        - basePrice
        - finalPrice
        - currency
        - appliedRules
      properties:
        basePrice:
          type: number
          format: double
          multipleOf: 0.01
        finalPrice:
          type: number
          format: double
          multipleOf: 0.01
        currency:
          type: string
          enum: [USD, EUR, GBP]
        discountAmount:
          type: number
          format: double
          multipleOf: 0.01
        appliedRules:
          type: array
          items:
            type: object
            required:
              - ruleId
              - ruleName
              - impact
            properties:
              ruleId:
                type: string
                format: uuid
              ruleName:
                type: string
              impact:
                type: number
                format: double
                multipleOf: 0.01

    AuditEvent:
      type: object
      required:
        - id
        - entityType
        - entityId
        - action
        - actorId
        - timestamp
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        entityType:
          type: string
        entityId:
          type: string
          format: uuid
        action:
          type: string
          enum: [created, updated, deleted, viewed]
        actorId:
          type: string
          format: uuid
        changes:
          type: object
          additionalProperties: true
          description: Key-value map of changed fields and their before/after values
        httpStatusCode:
          type: integer
          enum: [200, 201, 204, 400, 401, 403, 404, 409, 422, 500]
        timestamp:
          type: string
          format: date-time
          readOnly: true

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
        totalPages:
          type: integer
        totalItems:
          type: integer
        itemsPerPage:
          type: integer
