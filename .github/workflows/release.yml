name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-binary:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ''
          - os: ubuntu-latest
            target: linux-arm64
            ext: ''
          - os: macos-latest
            target: darwin-x64
            ext: ''
          - os: macos-latest
            target: darwin-arm64
            ext: ''
    
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      
      - name: Install dependencies
        run: bun install
      
      - name: Build binary
        run: bun build ./src/cli.ts --compile --outfile spec-mind-${{ matrix.target }}${{ matrix.ext }}
      
      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: spec-mind-${{ matrix.target }}${{ matrix.ext }}
          asset_name: spec-mind-${{ matrix.target }}${{ matrix.ext }}
          asset_content_type: application/octet-stream
      
      - name: Generate SHA256 checksum
        run: sha256sum spec-mind-${{ matrix.target }}${{ matrix.ext }} > spec-mind-${{ matrix.target }}.sha256
      
      - name: Upload checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: spec-mind-${{ matrix.target }}.sha256
          asset_name: spec-mind-${{ matrix.target }}.sha256
          asset_content_type: text/plain

  update-homebrew:
    needs: [build-binary]
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: msegoviadev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          ref: main
      
      - name: Download checksums and update formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BASE_URL="https://github.com/msegoviadev/spec-mind/releases/download/v${VERSION}"
          
          # Download checksums (guaranteed to exist after build-binary completes)
          curl -sLO "${BASE_URL}/spec-mind-darwin-arm64.sha256"
          curl -sLO "${BASE_URL}/spec-mind-darwin-x64.sha256"
          curl -sLO "${BASE_URL}/spec-mind-linux-x64.sha256"
          curl -sLO "${BASE_URL}/spec-mind-linux-arm64.sha256"
          
          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/spec-mind.rb
          
          # Update checksums
          sed -i '/spec-mind-darwin-arm64/{n;s/sha256 "[^"]*"/sha256 "'"$(cut -d' ' -f1 spec-mind-darwin-arm64.sha256)"'"/}' Formula/spec-mind.rb
          sed -i '/spec-mind-darwin-x64/{n;s/sha256 "[^"]*"/sha256 "'"$(cut -d' ' -f1 spec-mind-darwin-x64.sha256)"'"/}' Formula/spec-mind.rb
          sed -i '/spec-mind-linux-x64/{n;s/sha256 "[^"]*"/sha256 "'"$(cut -d' ' -f1 spec-mind-linux-x64.sha256)"'"/}' Formula/spec-mind.rb
          sed -i '/spec-mind-linux-arm64/{n;s/sha256 "[^"]*"/sha256 "'"$(cut -d' ' -f1 spec-mind-linux-arm64.sha256)"'"/}' Formula/spec-mind.rb
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/spec-mind.rb
          git commit -m "Update spec-mind to v${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push