name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: bun install
      
      - name: Build
        run: bun run build
      
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binary:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ''
          - os: ubuntu-latest
            target: linux-arm64
            ext: ''
          - os: macos-latest
            target: darwin-x64
            ext: ''
          - os: macos-latest
            target: darwin-arm64
            ext: ''
          - os: windows-latest
            target: windows-x64
            ext: '.exe'
    
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      
      - name: Install dependencies
        run: bun install
      
      - name: Build binary
        run: bun build ./src/cli.ts --compile --outfile spec-mind-${{ matrix.target }}${{ matrix.ext }}
      
      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: spec-mind-${{ matrix.target }}${{ matrix.ext }}
          asset_name: spec-mind-${{ matrix.target }}${{ matrix.ext }}
          asset_content_type: application/octet-stream