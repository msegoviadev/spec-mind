name: Update Homebrew Formula

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Get release version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Download checksums
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BASE_URL="https://github.com/msegoviadev/spec-mind/releases/download/v${VERSION}"
          
          curl -sLO "${BASE_URL}/spec-mind-darwin-arm64.sha256"
          curl -sLO "${BASE_URL}/spec-mind-darwin-x64.sha256"
          curl -sLO "${BASE_URL}/spec-mind-linux-x64.sha256"
          curl -sLO "${BASE_URL}/spec-mind-linux-arm64.sha256"
      
      - name: Extract checksums
        id: checksums
        run: |
          DARWIN_ARM64=$(cut -d' ' -f1 spec-mind-darwin-arm64.sha256)
          DARWIN_X64=$(cut -d' ' -f1 spec-mind-darwin-x64.sha256)
          LINUX_X64=$(cut -d' ' -f1 spec-mind-linux-x64.sha256)
          LINUX_ARM64=$(cut -d' ' -f1 spec-mind-linux-arm64.sha256)
          
          echo "darwin_arm64=${DARWIN_ARM64}" >> $GITHUB_OUTPUT
          echo "darwin_x64=${DARWIN_X64}" >> $GITHUB_OUTPUT
          echo "linux_x64=${LINUX_X64}" >> $GITHUB_OUTPUT
          echo "linux_arm64=${LINUX_ARM64}" >> $GITHUB_OUTPUT
      
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: msegoviadev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          ref: main
      
      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DARWIN_ARM64="${{ steps.checksums.outputs.darwin_arm64 }}"
          DARWIN_X64="${{ steps.checksums.outputs.darwin_x64 }}"
          LINUX_X64="${{ steps.checksums.outputs.linux_x64 }}"
          LINUX_ARM64="${{ steps.checksums.outputs.linux_arm64 }}"
          
          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/spec-mind.rb
          
          # Update checksums by matching URL context and replacing sha256 on next line
          sed -i '/spec-mind-darwin-arm64/{n;s/sha256 "[^"]*"/sha256 "'"${DARWIN_ARM64}"'"/}' Formula/spec-mind.rb
          sed -i '/spec-mind-darwin-x64/{n;s/sha256 "[^"]*"/sha256 "'"${DARWIN_X64}"'"/}' Formula/spec-mind.rb
          sed -i '/spec-mind-linux-x64/{n;s/sha256 "[^"]*"/sha256 "'"${LINUX_X64}"'"/}' Formula/spec-mind.rb
          sed -i '/spec-mind-linux-arm64/{n;s/sha256 "[^"]*"/sha256 "'"${LINUX_ARM64}"'"/}' Formula/spec-mind.rb
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/spec-mind.rb
          git commit -m "Update spec-mind to v${{ steps.version.outputs.VERSION }}"
          git push