name: Update Homebrew Formula

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Get release version from workflow run
        id: version
        run: |
          # Get the release tag from the completed workflow run
          WORKFLOW_RUN_ID=${{ github.event.workflow_run.id }}
          gh api repos/${{ github.repository }}/workflow-runs/$WORKFLOW_RUN_ID/artifacts --jq '.artifacts[] | select(.name | startswith("spec-mind")) | .name' | head -1 | sed 's/spec-mind-//' | sed 's/-.*//' > /tmp/version.txt || true
          
          # If that didn't work, get from latest release
          if [ ! -s /tmp/version.txt ]; then
            gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' | sed 's/^v//' > /tmp/version.txt
          fi
          
          VERSION=$(cat /tmp/version.txt)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: msegoviadev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          ref: main
      
      - name: Download checksums and update formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BASE_URL="https://github.com/msegoviadev/spec-mind/releases/download/v${VERSION}"
          
          echo "Downloading checksums for v${VERSION}..."
          
          # Download all checksum files
          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            if curl -sLO "${BASE_URL}/spec-mind-darwin-arm64.sha256" && \
               curl -sLO "${BASE_URL}/spec-mind-darwin-x64.sha256" && \
               curl -sLO "${BASE_URL}/spec-mind-linux-x64.sha256" && \
               curl -sLO "${BASE_URL}/spec-mind-linux-arm64.sha256"; then
              # Verify files are valid (not "Not Found" error pages)
              if grep -q "sha256" spec-mind-darwin-arm64.sha256 2>/dev/null || \
                 grep -E "^[a-f0-9]{64}" spec-mind-darwin-arm64.sha256; then
                echo "Checksums downloaded successfully"
                break
              fi
            fi
            echo "Checksums not available yet, waiting..."
            sleep 10
          done
          
          # Verify downloads
          echo "=== Downloaded files ==="
          ls -la *.sha256
          for f in *.sha256; do
            echo "$f:"
            cat "$f"
          done
          
          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/spec-mind.rb
          
          # Update checksums
          sed -i '/spec-mind-darwin-arm64/{n;s/sha256 "[^"]*"/sha256 "'"$(cut -d' ' -f1 spec-mind-darwin-arm64.sha256)"'"/}' Formula/spec-mind.rb
          sed -i '/spec-mind-darwin-x64/{n;s/sha256 "[^"]*"/sha256 "'"$(cut -d' ' -f1 spec-mind-darwin-x64.sha256)"'"/}' Formula/spec-mind.rb
          sed -i '/spec-mind-linux-x64/{n;s/sha256 "[^"]*"/sha256 "'"$(cut -d' ' -f1 spec-mind-linux-x64.sha256)"'"/}' Formula/spec-mind.rb
          sed -i '/spec-mind-linux-arm64/{n;s/sha256 "[^"]*"/sha256 "'"$(cut -d' ' -f1 spec-mind-linux-arm64.sha256)"'"/}' Formula/spec-mind.rb
          
          # Verify update
          echo "=== Updated formula ==="
          grep -A1 'sha256' Formula/spec-mind.rb
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/spec-mind.rb
          git commit -m "Update spec-mind to v${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push